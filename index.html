<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeLuv Legal</title>
    <style>
      :root {
        --bg: #fbf7f3;
        --card: #fffefc;
        --text: #253049;
        --muted: #5f6778;
        --accent: #e95378;
        --border: rgba(37, 48, 73, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #fffaf6 0%, var(--bg) 100%);
        color: var(--text);
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100% - 32px));
        padding: 32px 0;
      }

      section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 18px 50px rgba(37, 48, 73, 0.06);
        padding: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 2.8rem);
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.7;
      }

      nav {
        display: grid;
        gap: 12px;
      }

      a {
        display: block;
        padding: 16px 18px;
        border: 1px solid var(--border);
        border-radius: 16px;
        color: var(--text);
        text-decoration: none;
        font-weight: 700;
      }

      a:hover,
      a:focus {
        border-color: var(--accent);
        color: var(--accent);
        outline: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>BeLuv Legal</h1>
        <p>
          Public legal documents for BeLuv. Use the Privacy Policy URL in
          Google Play Console.
        </p>
        <nav aria-label="Legal documents">
          <a href="./privacy-policy.html">Privacy Policy</a>
          <a href="./terms-and-conditions.html">Terms &amp; Conditions</a>
          <a href="./child-safety-standards.html">Child Safety Standards</a>
          <a href="./account-deletion.html">Account Deletion</a>
        </nav>
      </section>
    </main>
  </body>
</html>
